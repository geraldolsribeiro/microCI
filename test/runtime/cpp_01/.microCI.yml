steps:
  - name: "Build C++ application using GCC"
    description: "Description of this step"
    plugin:
      name: cpp
      bash: |
        g++ prog.cpp -o prog_cpp_gcc
        ./prog_cpp_gcc >> output.txt

  - name: "Build C application using GCC"
    description: "Description of this step"
    plugin:
      name: cpp
      bash: |
        gcc prog.c -o prog_c_gcc
        ./prog_c_gcc >> output.txt

  - name: "Build C++ application using Clang"
    description: "Description of this step"
    plugin:
      name: cpp
      bash: |
        clang++-22 prog.cpp -o prog_cpp_clang
        ./prog_cpp_clang >> output.txt

  - name: "Build C application using Clang"
    description: "Description of this step"
    plugin:
      name: cpp
      bash: |
        clang-22 prog.c -o prog_c_clang
        ./prog_c_clang >> output.txt

