steps:
  - name: Create PDF presentation from Markdown
    plugin:
      name: beamer
      output: output_filename.pdf
      source: # List of source files, use the number for ordering the sections
        - 01_the_ci_cd_problem.md
      lang: en-US # Presentation language: pt-BR, en-US, ...
      institute: Your Company Name
      date: \today
      title: microCI
      subtitle: Portable, Auditable Automation Pipelines
      author:
        - Geraldo Ribeiro
      aspectratio: 169
      subject: microCI - Portable, Auditable Automation Pipelines
      keywords: [microci, portable, auditable, pipeline]
      # slide-level: 2          # use second level `##` to start a new slide
      # links-as-notes: true
      # natbib: true            # Use natbib format
      # bibliography: refs.bib  # Name of bibliography reference file
      # theme: STR
      theme: "Madrid"
      fonttheme: "professionalfonts" # FIXME
      colortheme: "seahorse" # FIXME
      header-includes: # list of packages required by the presentation
        - \usepackage{tikz}
        - \usepackage{booktabs}
        - \usepackage{fontawesome5}
