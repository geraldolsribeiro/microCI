steps:
  - name: "Download external files into the project"
    description: "Retrieve build dependencies from external sources."
    ssh: # Required for git_archive
      copy_from: "${HOME}/.ssh" # Inject SSH keys into the Docker container's default user path
    plugin:
      name: "fetch"
      target: include # Default location for fetched files; can be overridden by items/target
      items:
        # Supported item types:
        # * git_archive - Extract only the files specified in the `files` field
        # * url - Download a single file
        - git_archive: https://github.com/geraldolsribeiro/microCI.git # Fetch from a public repository
          target: /tmp/ # Directory where files will be placed; overrides the default target
          tag: master # Tag, branch, commit hash, or HEAD (latest commit on the default branch)
          strip-components: 1 # Remove one leading directory level
          files: # List of files to extract into the target directory
            - test/help.txt # Final file will be /tmp/help.txt because one directory level was removed
        - git_archive: https://github.com/User/repo/archive/master.tar.gz # Branch specified in the URL path
          target: /tmp/
          token: personal_token # Authenticate using a token
          files:
            - README.md
        - git_archive: https://github.com/User/repo/archive/master.tar.gz # Fetch from a private repository with authentication
          offline: /tmp/repo.tar.gz # Fallback file used when the network is unavailable
          target: /tmp/
          token: personal_token
          files:
            - README.md
        - git_archive: git@gitlabcorp.xyz.com.br:group/repo.git # Fetch using an SSH key
          target: /tmp/include/
          tag: HEAD # Use the latest commit
          files:
            - README.md
            - include/*.h # Supports glob patterns
        - git_archive: git@gitlabcorp.xyz.com.br:group/repo.git
          target: /tmp/lib/
          files:
            - lib/*.so
        - git_archive: git@gitlabcorp.xyz.com.br:group/repo.git
          target: /tmp/lib/
          strip-components: 2 # Remove two directory levels from extracted files
          files:
            - path1/path2/lib/*.so # Final file will be /tmp/lib/lib/*.so
        - url: https://raw.githubusercontent.com/adishavit/argh/master/argh.h
          target: /tmp/include # Directory where this file will be placed
        - url: https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp
        - url: https://raw.githubusercontent.com/pantor/inja/master/single_include/inja/inja.hpp
        - github: adishavit/argh master # Fetch from GitHub using a branch name
        - github: adishavit/argh v1.3.2 # Fetch from GitHub using a tag name
          target: /tmp/
        - github: adishavit/argh v1.3.2
          offline: /tmp/repo2.tar.gz

  - name: "Download external files into the project"
    description: "Retrieve build dependencies from external sources."
    ssh: # Required for git_archive
      copy_from: "${HOME}/.ssh"
      copy_to: "/home/bitnami/.ssh" # Inject SSH keys into the specified directory in the Docker container.
    plugin:
      name: "fetch"
      target: include # Default location for fetched files
      items:
        - git_archive: git@gitlabcorp.xyz.com.br:group/repo.git
          target: /tmp/include/
          files:
            - README.md
            - include/*.h
        - git_archive: git@gitlabcorp.xyz.com.br:group/repo.git
          target: /tmp/lib/
          files:
            - lib/*.so
        - url: https://raw.githubusercontent.com/adishavit/argh/master/argh.h
          target: /tmp/include # Directory where this file will be placed
        - url: https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp
        - url: https://raw.githubusercontent.com/pantor/inja/master/single_include/inja/inja.hpp
