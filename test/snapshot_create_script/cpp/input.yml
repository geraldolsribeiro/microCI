steps:
  - name: "Build static version of microCI"
    description: "Description of this step"
    plugin:
      name: cpp
      bash: |
        # Use compiler directly
        gcc prog.c -o prog_c
        g++ prog.cpp -o prog_cpp
        # Test
        ./prog_c
        ./prog_cpp
        make clean
        clang-22 prog.c -o prog_c
        clang++-22 prog.cpp -o prog_cpp
        # Test
        ./prog_c
        ./prog_cpp
        make clean
        make prog_c prog_cpp

