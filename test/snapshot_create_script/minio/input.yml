# See **MinIO Client** documentation at <https://github.com/minio/mc>.
steps:
  - name: "Manage artifacts in bucket"
    description: "Save artifact to MinIO, fetch artifact from MinIO"
    run_as: user
    envs:
      HOME: /tmp/
      MICROCI_MINIO_URL: http://10.20.30.40:5000
      MICROCI_MINIO_ACCESS_KEY: xxxxx
      MICROCI_MINIO_SECRET_KEY: sssss
    plugin:
      name: minio
      bash: |
        # List files in the bucket
        mc ls microci/bucket_name
        # Copy files from workspace to the bucket
        mc cp Makefile microci/bucket_name/
        # Copy files from the bucket to the workspace
        mc cp microci/bucket_name/image.png .
