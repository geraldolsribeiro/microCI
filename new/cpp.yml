steps:
  - name: "Build C++ application using GCC"
    description: "Description of this step"
    plugin:
      name: cpp
      bash: |
        g++ prog.cpp -o prog_cpp

  - name: "Build C application using GCC"
    description: "Description of this step"
    plugin:
      name: cpp
      bash: |
        gcc prog.c -o prog_c

  - name: "Build C++ application using Clang"
    description: "Description of this step"
    plugin:
      name: cpp
      bash: |
        clang++-22 prog.cpp -o prog_cpp

  - name: "Build C application using Clang"
    description: "Description of this step"
    plugin:
      name: cpp
      bash: |
        clang-22 prog.c -o prog_c
