steps:
  - name: "Ignored step"
    description: "This step should be ignored"
    plugin:
      name: skip # This step will not be executed

  - name: "Another ignored step - build static version of microCI"
    description: "This step should be executed"
    docker: "gcc:13"
    network: bridge
    run_as: root
    plugin:
      name: skip # This step will not be executed
      bash: |
        apt update
        apt upgrade -y
        apt install -y xxd libspdlog-dev libyaml-cpp-dev
        make -C src clean all
        make -C test
        # Changes the file owner from root to the current user
        chown $(id -u):$(id -g) -Rv src/microCI
