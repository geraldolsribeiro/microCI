#   # asciidoc plugin
#   
#{{{
steps:
  - name: "Generate HTML from Asciidoc"
    description: "Description of this step"
    plugin:
      name: asciidoc
      output_format: html
      destination_dir: _book
      input:
        - book/index.adoc

  - name: "Generate PDF from Asciidoc"
    description: "Description of this step"
    plugin:
      name: asciidoc
      output_format: pdf
      destination_dir: _book
      input:
        - book/index.adoc
#}}}
