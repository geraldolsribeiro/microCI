steps:
  - name: "SAST with flawfinder"
    description: "Statically analyzes the source code with the flawfinder tool"
    run_as: user
    plugin:
      name: "flawfinder"
      source: # list of source files to analyze
        # - "."
        - "src/*.cpp"
        - "test/*.cpp"
        - "include/*.hpp"
